AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC role for networking-demo (networking account side)

Parameters:
  GitHubOrg:
    Type: String
    Default: madlinux768
  GitHubRepo:
    Type: String
    Default: retail-store-sample-app
  OIDCProviderArn:
    Type: String
    Default: ''
    Description: ARN of existing GitHub OIDC provider (leave blank to create one)

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, '']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: networking-demo-github-actions-networking
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::173471018689:role/networking-demo-github-actions-app
            Action: sts:AssumeRole
      Policies:
        - PolicyName: NetworkingDemoResources
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EC2Full
                Effect: Allow
                Action: ec2:*
                Resource: '*'
              - Sid: RAM
                Effect: Allow
                Action: ram:*
                Resource: '*'
              - Sid: STS
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
