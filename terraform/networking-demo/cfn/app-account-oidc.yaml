AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC role for networking-demo (app account side)

Parameters:
  GitHubOrg:
    Type: String
    Default: madlinux768
  GitHubRepo:
    Type: String
    Default: retail-store-sample-app
  OIDCProviderArn:
    Type: String
    Default: ''
    Description: ARN of existing GitHub OIDC provider (leave blank to create one)

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, '']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: networking-demo-github-actions-app
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: TerraformStateBackend
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::retail-store-terraform-state-173471018689
                  - arn:aws:s3:::retail-store-terraform-state-173471018689/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                Resource: arn:aws:dynamodb:us-west-2:173471018689:table/retail-store-terraform-locks
        - PolicyName: NetworkingDemoAppResources
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EC2
                Effect: Allow
                Action: ec2:*
                Resource: '*'
              - Sid: ELBv2
                Effect: Allow
                Action: elasticloadbalancing:*
                Resource: '*'
              - Sid: Route53
                Effect: Allow
                Action: route53:*
                Resource: '*'
              - Sid: Lambda
                Effect: Allow
                Action: lambda:*
                Resource: '*'
              - Sid: IAM
                Effect: Allow
                Action: iam:*
                Resource: arn:aws:iam::173471018689:role/networking-demo-*
              - Sid: CloudWatchAndEvents
                Effect: Allow
                Action:
                  - cloudwatch:*
                  - events:*
                  - logs:*
                Resource: '*'
              - Sid: STS
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                  - sts:AssumeRole
                Resource:
                  - '*'
                  - arn:aws:iam::378147474529:role/networking-demo-github-actions-networking

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
