name: Deploy Networking Demo

on:
  workflow_dispatch:
    inputs:
      auto_approve:
        description: 'Auto-approve terraform apply'
        required: false
        default: false
        type: boolean
      app_vpc_id:
        description: 'App VPC ID (e.g. vpc-0abc1234)'
        required: true
        type: string
      app_private_subnet_ids:
        description: 'App private subnet IDs, comma-separated'
        required: true
        type: string
      app_route_table_id:
        description: 'App VPC route table ID for TGW route'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  TF_VERSION: '1.9.0'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    env:
      TF_VAR_networking_role_arn: ${{ secrets.AWS_ROLE_ARN_NETWORKING }}
      TF_VAR_app_role_arn: ${{ secrets.AWS_ROLE_ARN_APP }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_APP }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-NetworkingDemo

      - name: Terraform Init
        working-directory: terraform/networking-demo
        run: terraform init

      - name: Clean stale state resources
        working-directory: terraform/networking-demo
        run: |
          terraform state rm 'time_sleep.attachment_pending' || true
          terraform state rm 'aws_ec2_transit_gateway_vpc_attachment_accepter.app' || true

      - name: Terraform Plan
        id: plan
        working-directory: terraform/networking-demo
        run: |
          SUBNETS_JSON=$(echo '${{ github.event.inputs.app_private_subnet_ids }}' | \
            python3 -c "import sys,json; ids=sys.stdin.read().strip().split(','); print(json.dumps([s.strip() for s in ids]))")

          set +e
          terraform plan \
            -input=false \
            -out=tfplan \
            -detailed-exitcode \
            -var="app_vpc_id=${{ github.event.inputs.app_vpc_id }}" \
            -var="app_private_subnet_ids=${SUBNETS_JSON}" \
            -var="app_route_table_id=${{ github.event.inputs.app_route_table_id }}"
          exitcode=$?
          set -e

          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ "$exitcode" -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          elif [ "$exitcode" -eq 2 ]; then
            echo "::notice::Changes detected, apply needed"
          else
            echo "::notice::No changes detected"
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2' || github.event.inputs.auto_approve == 'true'
        working-directory: terraform/networking-demo
        run: terraform apply -input=false tfplan

      - name: Output summary
        if: steps.plan.outputs.exitcode == '2' || github.event.inputs.auto_approve == 'true'
        working-directory: terraform/networking-demo
        run: |
          echo "### Networking Demo Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Transit Gateway ID:** $(terraform output -raw transit_gateway_id 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "**Partner VPC ID:** $(terraform output -raw partner_vpc_id 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "**NLB DNS:** $(terraform output -raw nlb_dns_name 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "**Partner IP:** $(terraform output -raw partner_private_ip 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
