AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC role for networking-demo (networking account side)

Parameters:
  GitHubOrg:
    Type: String
    Default: madlinux768
  GitHubRepo:
    Type: String
    Default: retail-store-sample-app
  OIDCProviderArn:
    Type: String
    Default: ''
    Description: ARN of existing GitHub OIDC provider (leave blank to create one)

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, '']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: networking-demo-github-actions-networking
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::173471018689:role/networking-demo-github-actions-app
            Action: sts:AssumeRole
      Policies:
        - PolicyName: NetworkingDemoResources
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EC2ReadAll
                Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:Get*
                  - ec2:Search*
                Resource: '*'
              - Sid: EC2Write
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: '*'
              - Sid: TransitGateway
                Effect: Allow
                Action:
                  - ec2:CreateTransitGateway
                  - ec2:DeleteTransitGateway
                  - ec2:ModifyTransitGateway
                  - ec2:CreateTransitGatewayVpcAttachment
                  - ec2:DeleteTransitGatewayVpcAttachment
                  - ec2:AcceptTransitGatewayVpcAttachment
                  - ec2:CreateTransitGatewayRoute
                  - ec2:DeleteTransitGatewayRoute
                  - ec2:ReplaceTransitGatewayRoute
                Resource: '*'
              - Sid: RAM
                Effect: Allow
                Action:
                  - ram:CreateResourceShare
                  - ram:DeleteResourceShare
                  - ram:UpdateResourceShare
                  - ram:GetResourceShares
                  - ram:GetResourceShareAssociations
                  - ram:AssociateResourceShare
                  - ram:DisassociateResourceShare
                  - ram:TagResource
                  - ram:UntagResource
                  - ram:ListResourceSharePermissions
                  - ram:AssociateResourceSharePermission
                  - ram:DisassociateResourceSharePermission
                  - ram:ListPermissions
                  - ram:GetPermission
                Resource: '*'
              - Sid: EC2Instances
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:StopInstances
                  - ec2:StartInstances
                  - ec2:ModifyInstanceAttribute
                Resource: '*'
              - Sid: STS
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
